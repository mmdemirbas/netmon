<!DOCTYPE html>
<html>
<head>
    <title>netmon ui</title>
    <script src="chart.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .chart-container {
            width: 80%;
            margin: 20px auto;
        }
    </style>
</head>
<body>
<h1>Netmon - Network Connection Metrics Dashboard</h1>

<select id="timeRangeSelect">
    <option value="3600000">Last 1 hour</option>
    <option value="21600000">Last 6 hours</option>
    <option value="86400000" selected>Last 24 hours</option>
    <option value="604800000">Last 7 days</option>
    <option value="2592000000">Last 30 days</option>
    <option value="0">All time</option>
</select>
<select id="networkSelect"></select>

<div class="chart-container">
    <canvas id="latencyChart"></canvas>
</div>

<div class="chart-container">
    <canvas id="packetLossChart"></canvas>
</div>

<div class="chart-container">
    <canvas id="speedChart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
